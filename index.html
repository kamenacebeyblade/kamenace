document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

からメタを探す【エクストリーム／3on3形式】※一部例外あり<\u002Fdiv>\n    <\u002Fdiv>\n    <a href=\"https://x.com/kamen_ace_bey\" target=\"_blank\" rel=\"noopener\" style=\"width:34px;height:34px;border-radius:50%;overflow:hidden;border:1px solid #e6e8ee;display:block;flex:none\">\n      <img src=\"https://pbs.twimg.com/profile_images/2043592438925975552/lspsMSWU_400x400.jpg\" alt=\"仮面A\" style=\"width:100%;height:100%;object-fit:cover;display:block\">\n    <\u002Fa>\n  <\u002Fheader>\n\n  <!-- TABS -->\n  <div style=\"display:flex;gap:7px;margin-bottom:16px\">\n    <sc-for list=\"{{ tabs }}\" as=\"t\" hint-placeholder-count=\"3\">\n      <button sc-camel-on-click=\"{{ t.onClick }}\" style=\"{{ t.style }}\">{{ t.label }}<\u002Fbutton>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n  <!-- SEARCH PANEL -->\n  <section style=\"background:#fff;border:1px solid #e9ebf0;border-radius:16px;padding:18px 16px 17px;box-shadow:0 2px 14px rgba(30,40,70,.05)\">\n    <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:14px\">\n      <span style=\"font-size:16px;font-weight:800;color:#2b2d33\">パーツで絞り込む<\u002Fspan>\n      <span style=\"font-size:12px;color:#6b7280;font-weight:600;margin-left:auto;background:#f0f1f4;padding:3px 9px;border-radius:8px\">空欄OK・AND検索<\u002Fspan>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ dataLoading }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"display:flex;align-items:center;gap:8px;padding:10px 12px;background:#f7f8fa;border:1px solid #eef0f4;border-radius:12px;margin-bottom:12px;font-size:12px;font-weight:700;color:#6b7280\">\n      <span style=\"width:7px;height:7px;border-radius:50%;background:#111;flex:none\"><\u002Fspan>WBO大会データを読み込み中…\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ dataError }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 12px;background:#fafafa;border:1px solid #e6e8ee;border-radius:12px;margin-bottom:12px\">\n      <span style=\"font-size:12px;font-weight:700;color:#6b7280\">{{ dataError }}<\u002Fspan>\n      <button sc-camel-on-click=\"{{ onRetry }}\" style=\"flex:none;padding:6px 12px;background:#111;border:none;border-radius:8px;color:#fff;font-size:12px;font-weight:800;font-family:inherit;cursor:pointer\">再読み込み<\u002Fbutton>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <div style=\"display:flex;flex-direction:column;gap:10px\">\n      <sc-for list=\"{{ fields }}\" as=\"f\" hint-placeholder-count=\"3\">\n        <label style=\"display:block\">\n          <span style=\"display:block;font-size:12px;font-weight:700;color:#6b7280;margin-bottom:5px\">{{ f.label }}<\u002Fspan>\n          <div style=\"position:relative\">\n            <sc-raw-select value=\"{{ f.value }}\" sc-camel-on-change=\"{{ f.onChange }}\" style=\"width:100%;padding:13px 36px 13px 14px;background:#f7f8fa;border:1.5px solid #e6e8ee;border-radius:12px;color:#2b2d33;font-size:16px;font-family:inherit;font-weight:700\">\n              <option value=\"\">指定なし<\u002Foption>\n              <sc-for list=\"{{ f.opts }}\" as=\"o\" hint-placeholder-count=\"4\">\n                <option value=\"{{ o.value }}\">{{ o.label }}<\u002Foption>\n              <\u002Fsc-for>\n            <\u002Fsc-raw-select>\n            <svg style=\"position:absolute;right:13px;top:50%;transform:translateY(-50%);pointer-events:none\" width=\"14\" height=\"14\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#b6bac2\" stroke-width=\"2.6\" stroke-linecap=\"round\"><path d=\"M6 9l6 6 6-6\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n        <\u002Flabel>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div style=\"display:flex;gap:10px;margin-top:17px\">\n      <button sc-camel-on-click=\"{{ onReset }}\" style=\"flex:none;padding:13px 16px;background:#f2f3f6;border:none;border-radius:12px;color:#6b7280;font-size:16px;font-weight:800;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:6px\">\n        <svg width=\"14\" height=\"14\" ;display:flex;align-items:center;gap:13px;padding:15px 15px;background:transparent;border:none;cursor:pointer;text-align:left;font-family:inherit\">\n            <div style=\"flex:none;width:40px;height:40px;border-radius:12px;background:{{ r.rankBadgeBg }};display:flex;align-items:center;justify-content:center;color:{{ r.rankBadgeColor }};font-weight:900;font-size:17px\">{{ r.rankNum }}<\u002Fdiv>\n            <div style=\"flex:1;min-width:0\">\n              <div style=\"font-size:16px;font-weight:800;color:#2b2d33;line-height:1.3\">{{ r.name }}<\u002Fdiv>\n              <div style=\"font-size:12px;color:#6b7280;font-weight:500;margin-top:3px;line-height:1.5\">{{ r.parts }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"flex:none;text-align:right;margin-right:2px\">\n              <div style=\"font-weight:900;font-size:20px;line-height:1;color:{{ r.scoreColor }}\">{{ r.scoreInt }}<span style=\"font-size:14px\">.{{ r.scoreDec }}<\u002Fspan><span style=\"font-size:12px;font-weight:800\">pt.<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <svg style=\"flex:none;transition:transform .25s;transform:{{ r.chevronRotate }}\" width=\"19\" height=\"19\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#c2c5cd\" stroke-width=\"2.6\" stroke-linecap=\"round\"><path d=\"M6 9l6 6 6-6\"><\u002Fpath><\u002Fsvg>\n          <\u002Fbutton>\n\n          <sc-if value=\"{{ r.open }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"padding:0 15px 16px;animation:accopen .28s ease\">\n            <div style=\"height:1px;background:#eef0f4;margin-bottom:14px\"><\u002Fdiv>\n            <div style=\"font-size:16px;font-weight:800;color:#6b7280;margin-bottom:11px\">大会入賞実績<\u002Fdiv>\n\n            <div style=\"display:flex;flex-direction:column;gap:9px\">\n              <sc-for list=\"{{ r.achievements }}\" as=\"a\" hint-placeholder-count=\"2\">\n                <div style=\"background:#f7f8fa;border:1px solid #eef0f4;border-left:4px solid {{ a.  0 24 24\" fill=\"none\" stroke=\"#b6bac2\" stroke-width=\"2.4\" stroke-linecap=\"round\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><path d=\"M21 21l-4.3-4.3\"><\u002Fpath><\u002Fsvg>\n      <input type=\"text\" placeholder=\"キーワードを入力（空欄で全件）\" value=\"{{ noteQuery }}\" sc-camel-on-change=\"{{ onNoteQueryChange }}\" sc-camel-on-keydown=\"{{ onNoteKeyDown }}\" style=\"flex:1;background:transparent;border:none;color:#2b2d33;font-size:16px;font-family:inherit;font-weight:600;padding:10px 0\">\n      <button sc-camel-on-click=\"{{ onNoteSearch }}\" style=\"flex:none;padding:10px 16px;background:#111;border:none;border-radius:12px;color:#fff;font-size:16px;font-weight:900;font-family:inherit;cursor:pointer\">検索<\u002Fbutton>\n    <\u002Fdiv>\n    <div style=\"margin-top:9px;font-size:12px;color:#6b7280;font-weight:600;padding:0 2px\">note.comを対象にGoogle検索・新しいタブで開く<\u002Fdiv>\n\n    <a href=\"{{ qboxUrl }}\" target=\"_blank\" rel=\"noopener\" style=\"margin-top:12px;display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;background:#f7f8fa;border:1.5px solid #e6e8ee;border-radius:12px;color:#2b2d33;font-size:16px;font-weight:800;text-decoration:none\">\n      <svg width=\"16\" height=\"16\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#2b2d33\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z\"><\u002Fpath><\u002Fsvg>仮面Aに質問する\n    <\u002Fa>\n  <\u002Fsection>\n\n  <footer style=\"text-align:center;padding:26px 0 4px;font-size:12px;color:#6b7280;font-weight:600;letter-spacing:.03em\">KAMEN Ace LAB · 非公式ファンプロジェクト · 大会成績はWBOメタスコア台帳より自動集計<\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    tab: 'A',\n    fields: {},\n    searched: false,\n    openId: null,\n    noteFilter: 'all',\n    noteQuery: '',\n    dataLoading: true,\n    dataError: null,\n    combosA: [],\n    combosB: [],\n  };\n\n  SHEET_ID = '18EnfGqdBm9Ym4hGGsVpjMNtmD5ZmnCX9';\n  SHEET_GID = '462054966';\n\n  TABS = [\n    { id: 'A', label: 'BX・UX' },\n    { id: 'B', label: 'CX' },\n  ];\n\n  OVER_NAMES = { B: 'ブレイク', F: 'フロー', G: 'ガード', P: 'ピーク', O: 'アウター' };\n  ASSIST_NAMES = { A: 'アサルト', B: 'バンパー', C: 'チャージ', D: 'デュアル', E: 'イレイズ', F: 'フリー', H: 'ヘビー', J: 'ジャギー', K: 'ナックル', M: 'マッシブ', R: 'ラウンド', S: 'スラッシュ', T: 'ターン', V: 'ヴァーチカル', W: 'ウィール', Z: 'ジリオン', O: 'オッド', G: 'グラビティ' };\n  BIT_NAMES = {\n    A: 'アクセル', B: 'ボール', BS: 'バウンドスパイク', C: 'サイクロン', D: 'ドット', DB: 'ディスクボール',\n    E: 'エレベート', F: 'フラット', FB: 'フリーボール', G: 'グライド', GB: 'ギヤボール', GF: 'ギヤフラット',\n    GN: 'ギヤニードル', GP: 'ギヤポイント', GR: 'ギヤラッシュ', H: 'ヘキサ', HN: 'ハイニードル', HT: 'ハイテーパー',\n    I: 'イグニッション', J: 'ジョルト', K: 'キック', L: 'レベル', LF: 'ローフラット', LO: 'ローオーブ',\n    LR: 'ローラッシュ', M: 'マージ', MN: 'メタルニードル', N: 'ニードル', O: 'オーブ', P: 'ポイント',\n    Q: 'クエイク', R: 'ラッシュ', RA: 'ラバーアクセル', S: 'スパイク', T: 'テーパー', TK: 'トランスキック',\n    TP: 'トランスポイント', U: 'ユナイト', UF: 'アンダーフラット', UN: 'アンダーニードル', V: 'ボルテックス',\n    W: 'ウェッジ', WB: 'ウォールボール', WW: 'ウォールウェッジ', Y: 'イールディング', Z: 'ザップ',\n    FF: 'フリーフラット', GU: 'ギヤユナイト', Nr: 'ナロー', DS: 'ディスクスパイク',\n  };\n\n  NOTE_OPTS = [\n    { id: 'all', label: 'すべて' },\n    { id: 'article', label: '記事のみ' },\n    { id: 'qbox', label: '質問箱のみ' },\n  ];\n\n  NOTE_SITE_Q = {\n    all: '(site:note.com/kamen_a OR site:note.com/qa/kamen_a)',\n    article: 'site:note.com/kamen_a',\n    qbox: 'site:note.com/qa/kamen_a',\n  };\n\n  LOCKCHIP_OPTS = [\n    { value: 'エンペラー', label: 'エンペラー' },\n    { value: 'ワルキューレ', label: 'ワルキューレ' },\n    { value: 'walkure_emperor', label: 'ワルキューレ＆エンペラー' },\n    { value: 'other', label: 'その他（プラチップ）' },\n  ];\n\n  componentDidMount() {\n    this.loadSheet();\n  }\n\n  loadSheet() {\n    this.setState({ dataLoading: true, dataError: null });\n    const cbName = '__kamenAceSheetCb' + Math.random().toString(36).slice(2);\n    const script = document.createElement('script');\n    const cleanup = () => {\n      delete window[cbName];\n      script.parentNode && script.parentNode.removeChild(script);\n    };\n    window[cbName] = (json) => {\n      try {\n        this.processSheet(json);\n      } catch (e) {\n        this.setState({ dataLoading: false, dataError: 'データの解析に失敗した：' + (e && e.message ? e.message : String(e)) });\n      }\n      cleanup();\n    };\n    script.src = 'https://docs.google.com/spreadsheets/d/' + this.SHEET_ID +\n      '/gviz/tq?gid=' + this.SHEET_GID + '&tqx=out:json;responseHandler:' + cbName;\n    script.onerror = () => {\n      this.setState({ dataLoading: false, dataError: 'WBOメタスコア台帳の読み込みに失敗した。回線を確認して再読み込みしてくれ。' });\n      cleanup();\n    };\n    document.body.appendChild(script);\n  }\n\n  // イベント台帳（Google Sheet）の生データをRANKED限定・Final Stage優先で\n  // コンボ単位に集計し、公式レポート同様の参加人数×順位係数スコアを算出する\n  // 1プレイヤーの1配置はデッキ3枚分＝複数行にまたがるため、\n  // まず大会×プレイヤー単位で行をグループ化してからFinal Stage優先を適用する\n  // ラチェット／ビットが空欄のケースは実在する（バレットグリフォン等の固定ラチェット機体、\n  // 原文からビット名が読み取れず空欄登録された行など）。どちらも必須にすると集計から\n  // 丸ごと消えてしまうため、ブレードのみを必須とし、欠落部位はプレースホルダー表記で拾う\n  comboMetaFromRow(cell, r) {\n    const blade = cell(r, 11);\n    const ratchet = cell(r, 14) || '';\n    const bitCode = cell(r, 15) || '';\n    if (!blade) return null;\n    const lockchip = cell(r, 10);\n    const overCode = cell(r, 12) || '';\n    const assistCode = cell(r, 13) || '';\n    const isCX = !!lockchip;\n    const bitName = bitCode ? (this.BIT_NAMES[bitCode] || bitCode) : '';\n    const overName = overCode ? (this.OVER_NAMES[overCode] || overCode) : '';\n    const assistName = assistCode ? (this.ASSIST_NAMES[assistCode] || assistCode) : '';\n    const bitCodeLabel = bitCode || '不明';\n    const bitLabel = bitCode ? `${bitCode}（${bitName}）` : '不明';\n    const key = isCX\n      ? [lockchip, blade, overCode, assistCode, ratchet, bitCode].join('/')\n      : [blade, ratchet, bitCode].join('/');\n    const name = isCX\n      ? [lockchip, blade, `${overCode}${assistCode}`, ratchet, bitCodeLabel].filter(Boolean).join(' ')\n      : [blade, ratchet, bitCodeLabel].filter(Boolean).join(' ');\n    const parts = isCX\n      ? [lockchip, blade, overName, assistName, ratchet, bitLabel].filter(Boolean).join(' × ')\n      : [blade, ratchet, bitLabel].filter(Boolean).join(' × ');\n    return {\n      key, isCX, name, parts,\n      lockchip: lockchip || '', blade, overCode: overCode || '', overName,\n      assistCode: assistCode || '', assistName, ratchet, bitCode, bitName,\n    };\n  }\n\n  processSheet(json) {\n    const rows = (json && json.table && json.table.rows) || [];\n    const cell = (r, i) => (r.c && r.c[i] ? r.c[i].v : null);\n    const cellF = (r, i) => (r.c && r.c[i] ? (r.c[i].f != null ? r.c[i].f : r.c[i].v) : null);\n\n    const groups = new Map();\n    for (const r of rows) {\n      if (!r || !r.c) continue;\n      if (cell(r, 5) !== 'RANKED') continue;\n      const key = cell(r, 0) + '|' + cell(r, 8);\n      if (!groups.has(key)) groups.set(key, []);\n      groups.get(key).push(r);\n    }\n\n    const combosA = new Map();\n    const combosB = new Map();\n\n    for (const groupRows of groups.values()) {\n      const finalRows = groupRows.filter((r) => /Final/i.test(String(cell(r, 9) || '')));\n      const useRows = finalRows.length ? finalRows : groupRows;\n\n      const deckEntries = useRows\n        .map((r) => {\n          const meta = this.comboMetaFromRow(cell, r);\n          return meta ? { meta, row: r } : null;\n        })\n        .filter(Boolean);\n      if (!deckEntries.length) continue;\n      const deckNames = deckEntries.map((d) => d.meta.name);\n\n      for (const { meta, row } of deckEntries) {\n        const map = meta.isCX ? combosB : combosA;\n        let combo = map.get(meta.key);\n        if (!combo) {\n          combo = { ...meta, score: 0, ach: [] };\n          map.set(meta.key, combo);\n        }\n\n        const participants = Number(cell(row, 4)) || 0;\n        const rank = Number(cell(row, 7)) || 0;\n        const weight = rank === 1 ? 3 : rank === 2 ? 2 : rank === 3 ? 1 : 0;\n        combo.score += participants * weight;\n        if (rank >= 1 && rank <= 8) {\n          combo.ach.push({\n            tournament: cell(row, 2) || '(大会名不明)',\n            date: cellF(row, 3) || '',\n            participants: participants + '名',\n            stadium: cell(row, 6) || '-',\n            rank,\n            deck: deckNames,\n          });\n        }\n      }\n    }\n\n    // BX・UXとCXの結果を統合表示するため、正規化はカテゴリ別ではなく\n    // 両カテゴリ合算の最大値を基準に行う（そうしないと点数のスケールが揃わない）\n    const globalMaxScore = Math.max(\n      1,\n      ...Array.from(combosA.values()).map((c) => c.score),\n      ...Array.from(combosB.values()).map((c) => c.score)\n    );\n    const finalize = (map) => {\n      const list = Array.from(map.values());\n      list.forEach((c) => {\n        c.metaScore = Math.round((c.score / globalMaxScore) * 1000) / 10;\n        c.ach.sort((a, b) => a.rank - b.rank);\n        c.ach = c.ach.slice(0, 5);\n      });\n      list.sort((a, b) => b.score - a.score);\n      return list;\n    };\n\n    this.setState({\n      dataLoading: false, dataError: null,\n      combosA: finalize(combosA), combosB: finalize(combosB),\n    });\n  }\n\n  distinctOpts(list, valueKey, labelKey) {\n    const map = new Map();\n    for (const c of list) {\n      const v = c[valueKey];\n      if (v) map.set(v, c[labelKey] || v);\n    }\n    return Array.from(map.entries())\n      .sort((a, b) => a[0].localeCompare(b[0], 'ja'))\n      .map(([value, label]) => ({ value, label: value === label ? value : `${value}（${label}）` }));\n  }\n\n  fieldDefsFor(tab) {\n    const list = tab === 'A' ? this.state.combosA : this.state.combosB;\n    if (tab === 'A') {\n      return [\n        { key: 'blade', label: 'ブレード', opts: this.distinctOpts(list, 'blade', 'blade') },\n        { key: 'ratchet', label: 'ラチェット', opts: this.distinctOpts(list, 'ratchet', 'ratchet') },\n        { key: 'bit', label: 'ビット', opts: this.distinctOpts(list, 'bitCode', 'bitName') },\n      ];\n    }\n    return [\n      { key: 'lockchip', label: 'ロックチップ', opts: this.LOCKCHIP_OPTS },\n      { key: 'blade', label: 'ブレード', opts: this.distinctOpts(list, 'blade', 'blade') },\n      { key: 'over', label: 'オーバー', opts: this.distinctOpts(list, 'overCode', 'overName') },\n      { key: 'assist', label: 'アシスト', opts: this.distinctOpts(list, 'assistCode', 'assistName') },\n      { key: 'ratchet', label: 'ラチェット', opts: this.distinctOpts(list, 'ratchet', 'ratchet') },\n      { key: 'bit', label: 'ビット', opts: this.distinctOpts(list, 'bitCode', 'bitName') },\n    ];\n  }\n\n  FIELD_COMBO_KEY = {\n    A: { blade: 'blade', ratchet: 'ratchet', bit: 'bitCode' },\n    B: { lockchip: 'lockchip', blade: 'blade', over: 'overCode', assist: 'assistCode', ratchet: 'ratchet', bit: 'bitCode' },\n  };\n\n  filteredResults() {\n    const st = this.state;\n    // ラチェット/ビットなど両カテゴリ共通の項目だけで絞り込んだ場合は\n    // BX・UXとCXの結果を統合して1本のランキングとして表示する\n    const list = [...st.combosA, ...st.combosB];\n    const map = this.FIELD_COMBO_KEY[st.tab];\n    return list.filter((c) => {\n      for (const fk in map) {\n        const v = st.fields[fk];\n        if (!v) continue;\n        if (fk === 'lockchip' && v === 'other') {\n          if (!c.lockchip || c.lockchip === 'エンペラー' || c.lockchip === 'ワルキューレ') return false;\n          continue;\n        }\n        if (fk === 'lockchip' && v === 'walkure_emperor') {\n          if (c.lockchip !== 'エンペラー' && c.lockchip !== 'ワルキューレ') return false;\n          continue;\n        }\n        if (c[map[fk]] !== v) return false;\n      }\n      return true;\n    }).sort((a, b) => b.metaScore - a.metaScore).slice(0, 25);\n  }\n\n  rankInfo(rank) {\n    if (rank === 1) return { label: '優勝', color: '#b8860b', bg: '#fff4d1', accent: '#f5b400', icon: '🏆' };\n    if (rank === 2) return { label: '準優勝', color: '#6b7280', bg: '#eef0f4', accent: '#9ca3af', icon: '🥈' };\n    if (rank === 3) return { label: '3位', color: '#b45309', bg: '#fdecd8', accent: '#f59e0b', icon: '🥉' };\n    if (rank <= 8) return { label: 'ベスト8', color: '#404040', bg: '#eef0f0', accent: '#111', icon: '' };\n    return { label: rank + '位', color: '#6b7280', bg: '#f0f1f4', accent: '#c2c5cd', icon: '' };\n  }\n\n  scoreColorOf(s) {\n    if (s >= 90) return '#f5b400';\n    if (s >= 85) return '#111';\n    return '#6b7280';\n  }\n\n  setTab = (id) => this.setState({ tab: id, fields: {}, searched: false, openId: null });\n  setField = (key, v) => this.setState((s) => ({ fields: { ...s.fields, [key]: v } }));\n  reset = () => this.setState({ fields: {}, searched: false, openId: null });\n  search = () => { if (this.state.dataLoading) return; this.setState({ searched: true, openId: null }); };\n  toggle = (id) => this.setState((s) => ({ openId: s.openId === id ? null : id }));\n  setNote = (id) => this.setState({ noteFilter: id });\n  setNoteQuery = (v) => this.setState({ noteQuery: v });\n\n  runNoteSearch = () => {\n    const siteQ = this.NOTE_SITE_Q[this.state.noteFilter] || this.NOTE_SITE_Q.all;\n    const q = (this.state.noteQuery || '').trim();\n    const full = q ? `${siteQ} ${q}` : siteQ;\n    window.open('https://www.google.com/search?q=' + encodeURIComponent(full), '_blank', 'noopener');\n  };\n\n  renderVals() {\n    const st = this.state;\n\n    const tabs = this.TABS.map((t) => {\n      const active = st.tab === t.id;\n      return {\n        id: t.id, label: t.label,\n        onClick: () => this.setTab(t.id),\n        style: `flex:1;padding:11px 4px;border:1.5px solid ${active ? '#111' : '#e6e8ee'};border-radius:14px;background:${active ? '#111' : '#fff'};color:${active ? '#fff' : '#6b7280'};font-family:inherit;font-size:16px;font-weight:800;cursor:pointer;transition:all .16s;box-shadow:${active ? '0 4px 12px rgba(0,0,0,.18)' : 'none'}`,\n      };\n    });\n\n    const fields = this.fieldDefsFor(st.tab).map((f) => ({\n      key: f.key, label: f.label, opts: f.opts,\n      value: st.fields[f.key] || '',\n      onChange: (e) => this.setField(f.key, e.target.value),\n    }));\n\n    const raw = st.searched ? this.filteredResults() : [];\n    const results = raw.map((r, i) => {\n      const id = r.key;\n      const open = st.openId === id;\n      const first = i === 0;\n      const [scoreInt, scoreDec] = r.metaScore.toFixed(1).split('.');\n      return {\n        id, name: r.name, parts: r.parts, metaScore: r.metaScore, scoreInt, scoreDec,\n        rankNum: i + 1,\n        rankBadgeBg: first ? '#fff4d1' : '#eef0f4',\n        rankBadgeColor: first ? '#d99e00' : '#6b7280',\n        cardShadow: open ? '0 8px 24px rgba(0,0,0,.12)' : '0 2px 12px rgba(30,40,70,.05)',\n        cardBorder: open ? '1.5px solid #111' : '1.5px solid transparent',\n        scoreColor: this.scoreColorOf(r.metaScore),\n        open,\n        chevronRotate: open ? 'rotate(180deg)' : 'rotate(0deg)',\n        onToggle: () => this.toggle(id),\n        achievements: r.ach.map((a) => {\n          const ri = this.rankInfo(a.rank);\n          const deckMates = (a.deck || []).filter((n) => n !== r.name);\n          return {\n            tournament: a.tournament, date: a.date, participants: a.participants, stadium: a.stadium,\n            rankLabel: ri.label, rankColor: ri.color, rankBg: ri.bg, accent: ri.accent,\n            icon: ri.icon || '#' + a.rank,\n            iconWrap: ri.icon ? 'font-size:13px;line-height:1' : 'font-size:12px;font-weight:900;color:' + ri.color,\n            hasDeckMates: deckMates.length > 0,\n            deckMatesLabel: [...deckMates, r.name].join(' / '),\n          };\n        }),\n      };\n    });\n\n    const noteOptions = this.NOTE_OPTS.map((n) => {\n      const active = st.noteFilter === n.id;\n      return {\n        id: n.id, label: n.label,\n        onClick: () => this.setNote(n.id),\n        style: `flex:1;display:flex;align-items:center;justify-content:center;gap:7px;padding:10px 6px;background:${active ? '#f0f0f0' : '#f7f8fa'};border:1.5px solid ${active ? '#111' : '#e6e8ee'};border-radius:12px;color:${active ? '#111' : '#6b7280'};font-family:inherit;font-size:16px;font-weight:800;cursor:pointer;transition:all .16s`,\n        radioStyle: `flex:none;width:15px;height:15px;border-radius:50%;border:2px solid ${active ? '#111' : '#c2c5cd'};display:flex;align-items:center;justify-content:center`,\n        dotStyle: `width:7px;height:7px;border-radius:50%;background:${active ? '#111' : 'transparent'}`,\n      };\n    });\n\n    return {\n      tabs, fields, results,\n      searched: st.searched, resultCount: results.length,\n      hasNoResults: st.searched && results.length === 0,\n      noteOptions,\n      noteQuery: st.noteQuery,\n      onNoteQueryChange: (e) => this.setNoteQuery(e.target.value),\n      onNoteKeyDown: (e) => { if (e.key === 'Enter') this.runNoteSearch(); },\n      onNoteSearch: this.runNoteSearch,\n      qboxUrl: 'https://note.com/qa/kamen_a',\n      dataLoading: st.dataLoading, dataError: st.dataError, onRetry: () => this.loadSheet(),\n      onSearch: this.search, onReset: this.reset,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
